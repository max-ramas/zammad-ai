name: zammad-ai

services:
  #
  # ============= Kafka =============
  #
  kafka:
    image: confluentinc/cp-kafka:8.1.1@sha256:d20bd62f01826c454e88530efc6d73654cb4697182f37206742b96c7b947236e
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    networks:
      - internal
    healthcheck: &healthcheck
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
          "--version",
        ]
      start_period: 10s
      interval: 5s
      timeout: 10s
      retries: 10
    security_opt: &security_settings
      - no-new-privileges:true

  kafka-ui:
    image: provectuslabs/kafka-ui@sha256:8f2ff02d64b0a7a2b71b6b3b3148b85f66d00ec20ad40c30bdcd415d46d31818
    ports:
      - "8089:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - internal
    healthcheck:
      <<: *healthcheck
      test:
        [
          "CMD-SHELL",
          "wget --spider --timeout=1 http://localhost:8080/actuator/health",
        ]
    security_opt: *security_settings

  init-kafka:
    image: confluentinc/cp-kafka:8.1.1@sha256:d20bd62f01826c454e88530efc6d73654cb4697182f37206742b96c7b947236e
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    networks:
      - internal
    command: |
      # blocks until kafka is reachable
      echo -e 'Currently available topics:'
      kafka-topics --bootstrap-server kafka:9092 --list

      echo -e 'Creating kafka topics...'
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic ticket-events --replication-factor 1 --partitions 1

      echo -e 'Resulting topics:'
      kafka-topics --bootstrap-server kafka:9092 --list
    security_opt: *security_settings

  #
  # ============= Mail =============
  #
  mailpit:
    image: axllent/mailpit:v1.29.2@sha256:030f06031ce5c60913ac9363da1ab0d4be6fd2a78147dd0e1ca0fcac665d6b34
    ports:
      - "1025:1025" # SMTP Server
      - "8025:8025" # UI
    security_opt: *security_settings

  #
  # ============= Qdrant Vector DB =============
  #
  qdrant:
    image: qdrant/qdrant:v1.16.3@sha256:0425e3e03e7fd9b3dc95c4214546afe19de2eb2e28ca621441a56663ac6e1f46
    restart: always
    ports:
      - 6333:6333
      - 6334:6334
    expose:
      - 6333
      - 6334
      - 6335
    configs:
      - source: qdrant_config
        target: /qdrant/config/production.yaml
    networks:
      - internal
    volumes:
      - ./qdrant_data:/qdrant/storage
    security_opt: *security_settings

  init-qdrant:
    image: curlimages/curl:8.16.0
    depends_on:
      - qdrant
    entrypoint: ["/bin/sh", "-ceu"]
    command:
      - |
        QDRANT_URL="http://qdrant:6333"
        COLLECTION_NAME="zammad-ai_default"
        VECTOR_DIMENSION="1024"

        echo "Waiting for Qdrant API..."
        until curl -fsS "$${QDRANT_URL}/collections" >/dev/null; do
          sleep 2
        done

        echo "Checking collection '$${COLLECTION_NAME}'..."
        EXISTS="$$(curl -fsS "$${QDRANT_URL}/collections/$${COLLECTION_NAME}/exists" | tr -d '\n' | sed -n 's/.*"exists":\(true\|false\).*/\1/p')"

        if [ "$${EXISTS}" = "true" ]; then
          echo "Collection '$${COLLECTION_NAME}' already exists."
          exit 0
        fi

        echo "Creating collection '$${COLLECTION_NAME}'..."
        curl -fsS -X PUT "$${QDRANT_URL}/collections/$${COLLECTION_NAME}" \
          -H "Content-Type: application/json" \
          -d "{\"vectors\":{\"size\":$${VECTOR_DIMENSION},\"distance\":\"Cosine\"}}"

        echo "Collection '$${COLLECTION_NAME}' created."
    networks:
      - internal
    security_opt: *security_settings

configs:
  qdrant_config:
    content: |
      log_level: INFO

networks:
  internal:
