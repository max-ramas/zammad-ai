[project]
name = "zammad-ai"
license = { file = "../LICENSE" }
version = "0.1.0"
description = "GenAI-powered agent for Zammad"
readme = "README.md"
requires-python = "==3.13.9"
authors = [
    { name = "Fabian Reinold", email = "fabian.reinold@muenchen.de" },
    { name = "Lena Barth", email = "lena.barth@muenchen.de" },
    { name = "Paul Ilitz", email = "paul.ilitz@muenchen.de" },
]
maintainers = [
    { name = "Fabian Reinold", email = "fabian.reinold@muenchen.de" },
]

dependencies = [
    "aiofiles==24.1.0",
    "faststream[cli,kafka]==0.6.2",
    "feedparser==6.0.12",
    "langchain==0.3.27",
    "langchain-core==0.3.78",
    "langchain-openai==0.3.34",
    "langfuse==3.10.1",
    "logtools==0.8.7",
    "openai==2.1.0",
    "pydantic-settings==2.11.0",
    "python-dotenv==1.1.1",
    "truststore==0.10.4",
]

[dependency-groups]
dev = [
    "pre-commit==4.3.0",
    "ruff==0.14.2",
    "ipykernel==7.0.1",
    "jupyter==1.1.1",
]

[tool.uv]
add-bounds = "exact"
