[project]
name = "zammad-ai"
license = "MIT"
version = "0.1.0"
description = "GenAI-powered agent for Zammad"
readme = "README.md"
requires-python = "==3.13.9"
authors = [
    { name = "Fabian Reinold", email = "fabian.reinold@muenchen.de" },
    { name = "Lena Barth", email = "lena.barth@muenchen.de" },
    { name = "Paul Ilitz", email = "paul.ilitz@muenchen.de" },
]
maintainers = [
    { name = "Fabian Reinold", email = "fabian.reinold@muenchen.de" },
]

dependencies = [
    "faststream[cli,kafka]==0.6.3",
    "httpx==0.28.1",
    "cryptography==46.0.3",
    "pydantic-settings==2.12.0",
    "pydantic==2.12.4",
    "python-dotenv==1.2.1",
    "truststore==0.10.4",
]

[dependency-groups]
dev = [
    "ipykernel==7.1.0",
    "jupyter==1.1.1",
    "pre-commit==4.5.0",
    "pytest-asyncio==1.3.0",
    "pytest==9.0.1",
    "ruff==0.14.6",
]

[tool.uv]
add-bounds = "exact"

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["test"]
asyncio_mode = "auto"