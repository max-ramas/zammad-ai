[project]
name = "zammad-ai"
license = "MIT"
version = "0.1.0"
description = "GenAI-powered agent for Zammad"
readme = "README.md"
requires-python = "==3.13.9"
authors = [
    { name = "Fabian Reinold", email = "fabian.reinold@muenchen.de" },
    { name = "Lena Barth", email = "lena.barth@muenchen.de" },
    { name = "Paul Ilitz", email = "paul.ilitz@muenchen.de" },
]
maintainers = [
    { name = "Fabian Reinold", email = "fabian.reinold@muenchen.de" },
]

dependencies = [
    "faststream[cli,kafka]==0.6.2",
    "httpx==0.28.1",
    "cryptography==44.0.1",
    "pydantic-settings==2.11.0",
    "pydantic==2.11.9",
    "python-dotenv==1.1.1",
    "truststore==0.10.4",
]

[dependency-groups]
dev = [
    "ipykernel==7.0.1",
    "jupyter==1.1.1",
    "pre-commit==4.3.0",
    "pytest-asyncio==1.2.0",
    "pytest==8.4.2",
    "ruff==0.14.2",
]

[tool.uv]
add-bounds = "exact"

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["test"]
