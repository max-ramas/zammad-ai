# ============================================================================
# Zammad-AI Configuration Template
# ============================================================================
# Copy this file to config.yaml and adjust values for your use case
#
# IMPORTANT: Secrets (API keys, tokens) should be set in .env file, not here!
# See .env.example for required environment variables
#
# Configuration hierarchy (highest priority first):
#   1. CLI arguments
#   2. Environment variables (prefix: ZAMMAD_AI_)
#   3. .env file
#   4. This YAML file (config.yaml)
# ============================================================================

# ============================================================================
# Use Case Configuration
# ============================================================================
usecase:
  name: "my_usecase"
  description: "Description of your use case"

# ============================================================================
# GenAI Configuration
# ============================================================================
genai:
  sdk: "openai" # Currently only "openai" is supported
  chat_model: "gpt-4.1-mini" # Model for chat completions
  embeddings_model: "text-embedding-3-large" # Model for embeddings
  reasoning_effort: null # Options: "minimal", "low", "medium", "high", or null
  temperature: 0.0 # Temperature for chat completions (0.0 = deterministic)
  max_retries: 3 # Maximum number of retries for API calls

# Note: OpenAI SDK requires environment variables (set in .env):
#   OPENAI_API_KEY (required)
#   OPENAI_BASE_URL (optional, for custom endpoints/proxies)

# ============================================================================
# Zammad Configuration
# ============================================================================
# Set secrets in .env file:
#   ZAMMAD_AI_ZAMMAD__AUTH_TOKEN (required for type: "api")
#   ZAMMAD_AI_ZAMMAD__RSS_FEED_TOKEN (optional for type: "api")
#   ZAMMAD_AI_ZAMMAD__OAUTH2_CLIENT_SECRET (required for type: "eai")

zammad:
  type: "api" # Options: "api" or "eai"

  # For type: "api"
  base_url: "https://your-zammad-instance.example.com"
  knowledge_base_id: "1" # Optional: set to null to disable knowledge base
  timeout: 30 # Request timeout in seconds
  max_retries: 3 # Maximum number of retries for API calls
  http_proxy_url: null # Optional: proxy URL for routing requests (e.g. "http://proxy.example.com:8080")

  # For type: "eai" (alternative to "api"), use these instead:
  # eai_url: "https://your-zammad-eai.example.com/api/v1"
  # knowledge_base_id: "1"
  # timeout: 30
  # max_retries: 3
  # http_proxy_url: null
  # oauth2_client_id: "your-client-id"
  # oauth2_token_url: "https://your-zammad-eai.example.com/oauth/token"
  # oauth2_scope: null # Optional: OAuth 2.0 scope

# ============================================================================
# Qdrant Configuration
# ============================================================================
# Set secret in .env file:
#   ZAMMAD_AI_QDRANT__API_KEY (required)

qdrant:
  host: "https://your-qdrant-instance.example.com"
  api_key: null # Set via ZAMMAD_AI_QDRANT__API_KEY env var (recommended)
  collection_name: "your_collection_name"
  vector_name: null # Optional: specify vector name if needed (for namespacing)
  vector_dimension: 1024 # Dimension of embedding vectors

# ============================================================================
# Kafka Configuration
# ============================================================================
kafka:
  broker_url: "localhost:9092" # Kafka broker URL
  topic: "ticket-events" # Kafka topic to consume from
  group_id: null # Consumer group ID (defaults to null)

  # mTLS Security Configuration (optional)
  # Option 1: File-based mTLS (type: "file")
  # security:
  #   type: "file"
  #   ca_file_path: "/path/to/ca.pem"
  #   client_cert_path: "/path/to/client.pem"
  #   client_key_path: "/path/to/client.key"

  # Option 2: Environment/base64-encoded mTLS (type: "env")
  # Recommended: set values via ZAMMAD_AI_KAFKA__SECURITY__* environment variables
  # security:
  #   type: "env"
  #   ca_file_base64: "<base64-encoded CA cert>"
  #   pkcs12_base64: "<base64-encoded PKCS#12 payload>"
  #   pkcs12_pw_base64: "<base64-encoded PKCS#12 password>"

  security: null

# ============================================================================
# Valid Request Types
# ============================================================================
# List of request types that should be processed by the application
valid_request_types:
  - "example_request_type"

# ============================================================================
# Triage Configuration
# ============================================================================
triage:
  # Category setup: Define the categories for ticket classification
  # Each category requires only a unique name.
  categories:
    - name: "General Questions"
    - name: "Status Inquiries"
    - name: "Cannot Categorize"

  # Fallback category name when classification fails (must match a category name above)
  no_category_name: "Cannot Categorize"

  # Action setup: Define automated actions
  # type options: "KI_Antwort" (AI response), "Keine_Aktion" (no action), "Standardantwort" (standard answer)
  # answer: optional static answer text (used with type "Standardantwort")
  actions:
    - name: "no_action"
      description: "No automated action"
      type: "Keine_Aktion"
    - name: "ai_response"
      description: "Generate AI-powered response"
      type: "KI_Antwort"

  # Fallback action name when no rule matches (must match an action name above)
  no_action_name: "no_action"

  # Action rules: Define when to trigger specific actions
  # category_name and action_name must match names defined above
  action_rules:
    # Example: Always generate AI response for "General Questions"
    - category_name: "General Questions"
      action_name: "ai_response"

    # Example: Conditional action based on conditions
    - category_name: "Status Inquiries"
      action_name: "no_action" # Default action when no condition matches
      conditions:
        - priority: 1
          field: "days_since_request" # Options: "processing_id", "days_since_request"
          operator: "less" # Options: "equals", "not_equals", "less", "less_equals", "greater", "greater_equals"
          value: 30
          action_name: "ai_response"
        - priority: 2
          field: "days_since_request"
          operator: "greater_equals"
          value: 30
          action_name: "no_action"

  # Prompt configuration
  prompts:
    type: "langfuse" # Options: "langfuse", "string", or "file"

    # For type: "langfuse" (requires Langfuse credentials in .env)
    prompt_map:
      categories:
        label: "latest" # Prompt version label
        name: "your-usecase/categories" # Prompt name in Langfuse
      examples:
        label: "latest"
        name: "your-usecase/examples"
      role:
        label: "latest"
        name: "your-usecase/role"

    # For type: "string" (inline prompts), use:
    # type: "string"
    # prompt_map:
    #   categories: "Your inline categories prompt..."
    #   examples: "Your inline examples prompt..."
    #   role: "Your inline role prompt..."

    # For type: "file" (prompts from files), use:
    # type: "file"
    # prompt_map:
    #   categories: "/path/to/categories.txt"
    #   examples: "/path/to/examples.txt"
    #   role: "/path/to/role.txt"

# ============================================================================
# Optional Settings
# ============================================================================

# Frontend settings (optional web interface)
frontend:
  enabled: false # Set to true to enable frontend

# Langfuse integration toggle
langfuse_enabled: true # Set to false to disable Langfuse integration

# Application mode
mode: "production" # Options: "production", "development", "unittest"
