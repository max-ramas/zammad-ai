version: 1
formatters:
  simple:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  http:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  json:
    class: app.utils.logging.JsonFormatter
filters:
  metrics_filter:
    (): app.utils.logging.MetricsFilter
handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: json
    filters:
      - metrics_filter
    stream: ext://sys.stdout
  httpx:
    class: logging.StreamHandler
    formatter: json
    stream: ext://sys.stderr
loggers:
  uvicorn.access:
    level: INFO
    handlers: [console]
    propagate: no
  uvicorn.error:
    level: INFO
    handlers: [console]
    propagate: no
  dev:
    level: DEBUG
    handlers: [console]
    propagate: no
  zammad-ai:
    level: DEBUG
    propagate: yes
  faststream:
    level: INFO
    handlers: [console]
    propagate: no
  httpx:
    level: WARNING
    handlers: [httpx]
    propagate: no
  httpcore:
    level: WARNING
    handlers: [httpx]
    propagate: no
root:
  level: DEBUG
  handlers: [console]
