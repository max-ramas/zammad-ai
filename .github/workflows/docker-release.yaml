name: Build and Release Extractor Docker Image
permissions:
  contents: read

on:
  push:
    tags:
      - "zammad-ai-*" # Triggers only on zammad-ai tags
  workflow_dispatch: # Allows manual triggering of the workflow
    inputs:
      tag:
        description: "Zammad AI tag to release (e.g., zammad-ai-1.0.0)"
        required: true
        default: "zammad-ai-latest"

jobs:
  build-and-push-extractor:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      packages: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version from zammad-ai tag
        id: vars
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            FULL_TAG="${{ github.event.inputs.tag }}"
          else
            FULL_TAG=${GITHUB_REF#refs/tags/}
          fi

          # Extract version from zammad-ai-* tag (e.g., zammad-ai-1.0.0 -> 1.0.0)
          if [[ "$FULL_TAG" =~ ^zammad-ai-(.+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            echo "Error: Tag must start with 'zammad-ai-'"
            exit 1
          fi

          echo "full_tag=${FULL_TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "repo_lowercase=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Set build timestamp
        id: build_ts
        run: echo "BUILD_TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
      - name: Build and push zammad-ai Docker image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ./zammad-ai
          file: ./zammad-ai/Dockerfile
          push: true
          sbom: true
          provenance: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.repo_lowercase }}/zammad-ai:${{ steps.vars.outputs.version }}
            ghcr.io/${{ steps.vars.outputs.repo_lowercase }}/zammad-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            IMAGE_CREATED=${{ github.event.repository.pushed_at || env.BUILD_TS }}
            IMAGE_REVISION=${{ github.sha }}
            IMAGE_VERSION=${{ steps.vars.outputs.version }}
      - name: Image digest
        run: |
          echo "zammad-ai image built and pushed:"
          echo "  ghcr.io/${{ github.repository }}/zammad-ai:${{ steps.vars.outputs.version }}"
          echo "  ghcr.io/${{ github.repository }}/zammad-ai:latest"
